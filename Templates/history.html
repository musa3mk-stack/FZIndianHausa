<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FZ Fassara - Watch History</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #141414; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        .navbar { background-color: #000000; border-bottom: 2px solid #252525; padding: 15px 20px; display: flex; align-items: center; }
        .btn-back { background-color: transparent; color: #ffffff; border: 2px solid #444444; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-right: 15px; }
        .brand-title { color: #e50914; font-weight: bold; font-size: 1.2rem; }
        .container { max-width: 700px; margin: 0 auto; padding: 25px 20px; }
        .page-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 25px; border-left: 4px solid #e50914; padding-left: 10px; }
        .history-item { background-color: #1f1f1f; border-left: 5px solid #e50914; border-radius: 8px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-top: 1px solid #2d2d2d; border-right: 1px solid #2d2d2d; border-bottom: 1px solid #2d2d2d; }
        .item-left { min-w-0; padding-right: 10px; }
        .movie-title { font-size: 1.15rem; font-weight: bold; color: #ffffff; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .time-stamp { color: #888888; font-size: 0.85rem; }
        .btn-redo { background-color: transparent; color: #ffffff; border: 2px solid #e50914; padding: 10px 16px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.95rem; white-space: nowrap; }
        .btn-redo:active { background-color: #e50914; }
        .empty-state { text-align: center; padding: 50px 20px; color: #666666; }
        .empty-icon { font-size: 3.5rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav class="navbar"><a href="/dashboard" class="btn-back">←</a><h1 class="brand-title">Watch History</h1></nav>
    <div class="container">
        <h2 class="page-title">Recently Watched</h2>
        {% for record in records %}
            <div class="history-item">
                <div class="item-left">
                    <h4 class="movie-title">{{ record.video.title }}</h4>
                    <span class="time-stamp">⏰ {{ record.watched_at.strftime('%Y-%m-%d %H:%M') }}</span>
                </div>
                <a href="{{ url_for('watch_video', video_id=record.video.id) }}" class="btn-redo">Re-watch</a>
            </div>
        {% else %}
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <h4>No history records found!</h4>
            </div>
        {% endfor %}
    </div>
</body>
</html>
