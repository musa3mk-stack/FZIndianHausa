<!DOCTYPE html>

        .btn-netflix { background-color: #e50914; color: #ffffff; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); }
        .btn-outline { background-color: transparent; color: #ffffff; border: 2px solid #444444; }
        .btn-google { background-color: #ffffff; color: #000000; opacity: 0.4; cursor: not-allowed; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
