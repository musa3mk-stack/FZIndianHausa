<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FZ Fassara - Watch Later</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #141414; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        .navbar { background-color: #000000; border-bottom: 2px solid #252525; padding: 15px 20px; display: flex; align-items: center; }
        .btn-back { background-color: transparent; color: #ffffff; border: 2px solid #444444; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-right: 15px; }
        .brand-title { color: #e50914; font-weight: bold; font-size: 1.2rem; }
        .container { max-width: 700px; margin: 0 auto; padding: 25px 20px; }
        .page-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 25px; border-left: 4px solid #e50914; padding-left: 10px; }
        .list-card { background-color: #1f1f1f; border: 2px solid #2d2d2d; border-radius: 12px; margin-bottom: 15px; padding: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card-left { display: flex; align-items: center; min-w-0; }
        .thumb-box { width: 130px; height: 74px; object-fit: cover; border-radius: 6px; background-color: #000; margin-right: 15px; flex-shrink: 0; }
        .info-box { min-w-0; }
        .movie-title { font-size: 1.1rem; font-weight: bold; color: #ffffff; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge { background-color: #e50914; color: white; font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
        .btn-play { background-color: #e50914; color: white; padding: 14px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.1rem; flex-shrink: 0; box-shadow: 0 4px 10px rgba(229,9,20,0.3); border: none; cursor: pointer; }
        .btn-play:active { background-color: #b81d24; }
        .empty-state { text-align: center; padding: 50px 20px; color: #666666; }
        .empty-icon { font-size: 3.5rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav class="navbar"><a href="/dashboard" class="btn-back">←</a><h1 class="brand-title">Watch Later List</h1></nav>
    <div class="container">
        <h2 class="page-title">Your Saved Videos</h2>
        {% for item in items %}
            <div class="list-card">
                <div class="card-left">
                    <img src="{{ url_for('stream_thumb', filename=item.video.thumbnail) }}" class="thumb-box" alt="Cover">
                    <div class="info-box">
                        <h4 class="movie-title">{{ item.video.title }}</h4>
                        <span class="badge">{{ item.video.category }}</span>
                    </div>
                </div>
                <a href="{{ url_for('watch_video', video_id=item.video.id) }}" class="btn-play">▶</a>
            </div>
        {% else %}
            <div class="empty-state">
                <div class="empty-icon">🔖</div>
                <h4>Your watchlist is empty!</h4>
            </div>
        {% endfor %}
    </div>
</body>
</html>
