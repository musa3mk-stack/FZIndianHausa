<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FZ Fassara - Register</title>
    <style>
        /* Pure local premium styling - No internet required to load */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #141414; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card { 
            background-color: rgba(0, 0, 0, 0.85); 
            padding: 35px 30px; 
            border-radius: 12px; 
            max-width: 420px; 
            width: 100%; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .brand-name {
            color: #e50914;
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        .page-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label { 
            display: block;
            margin-bottom: 8px;
            color: #aaaaaa; 
            font-size: 0.9rem; 
            font-weight: bold;
        }
        /* Big Bold Input Fields for Easy Smartphone Typing */
        .form-control {
            width: 100%;
            padding: 16px;
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444444;
            border-radius: 8px;
            font-size: 1.05rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #e50914;
        }

        /* Legal Compliance Checkbox Gateway Container */
        .legal-gateway {
            display: flex;
            align-items: flex-start;
            margin-bottom: 22px;
            background-color: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333333;
        }
        .legal-checkbox {
            width: 22px;
            height: 22px;
            accent-color: #e50914;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .legal-text {
            font-size: 0.88rem;
            color: #cccccc;
            line-height: 1.4;
        }
        .legal-text a {
            color: #e50914;
            text-decoration: none;
            font-weight: bold;
        }
        .legal-text a:active {
            color: #ffc107;
        }

        /* Big Bold Red Premium Action Button */
        .btn-netflix { 
            display: block;
            width: 100%;
            background-color: #e50914; 
            color: #ffffff; 
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
            transition: opacity 0.2s;
        }
        /* Style adjustments when the button is locked/disabled */
        .btn-netflix:disabled {
            background-color: #555555;
            color: #999999;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }
        .btn-netflix:not(:disabled):active {
            transform: scale(0.99);
        }
        .alert {
            background-color: #e50914;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .footer-text {
            margin-top: 30px;
            text-align: center;
            color: #aaaaaa;
            font-size: 0.95rem;
        }
        .footer-text a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #aaaaaa;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="brand-name">FZ FASSARA</div>
        <h2 class="page-title">Create Account</h2>
        
        <!-- Display Notification Alerts locally -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Interactive Secure Registration Form -->
        <form method="POST" action="/register">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required autocomplete="off">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required autocomplete="off">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <!-- MANDATORY CHECKBOX: Legal gate for Play Store validation -->
            <div class="legal-gateway">
                <input type="checkbox" id="legalCheck" class="legal-checkbox" onchange="validateGateway()">
                <label for="legalCheck" class="legal-text">
                    I have read and completely agree to the 
                    <a href="/privacy" target="_blank">Privacy Policy</a> and 
                    <a href="/terms" target="_blank">Terms of Service</a>.
                </label>
            </div>

            <!-- Submit Button (Starts as disabled/locked) -->
            <button type="submit" id="signUpBtn" class="btn-netflix" disabled>Sign Up</button>
        </form>
        
        <div class="footer-text">
            Already have an account? <a href="/login">Sign in now</a>.
        </div>
        <a href="/" class="back-home">← Back to Home</a>
    </div>

    <!-- 100% Offline Independent Local Activation Script Engine -->
    <script>
        function validateGateway() {
            var checkbox = document.getElementById('legalCheck');
            var signUpBtn = document.getElementById('signUpBtn');
            
            // If checkbox is checked, unlock the register button, otherwise keep it locked
            if (checkbox.checked) {
                signUpBtn.disabled = false;
            } else {
                signUpBtn.disabled = true;
            }
        }
    </script>
</body>
</html>
